name: Checks

on:
    pull_request:
        branches: [main]

jobs:
    checks:
        name: Lint, Type Check & Build
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - run: npm ci

            - run: npx turbo run lint check-types build --filter=...[origin/main]
