version: 2
updates:
    # GitHub Actions
    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "05:00"
      commit-message:
          prefix: "[CI] "
      labels:
          - "dependencies"

    # Root
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "05:00"
      commit-message:
          prefix: "[Root] "
      assignees:
          - "enesyukselx"
      labels:
          - "dependencies"
      groups:
          security-updates:
              applies-to: security-updates
              patterns:
                  - "*"
          minor-updates:
              applies-to: version-updates
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"

    # apps/web
    - package-ecosystem: "npm"
      directory: "/apps/web"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "05:00"
      commit-message:
          prefix: "[F][web] "
      assignees:
          - "enesyukselx"
      labels:
          - "dependencies"
      groups:
          security-updates:
              applies-to: security-updates
              patterns:
                  - "*"
          minor-updates:
              applies-to: version-updates
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"

    # apps/docs
    - package-ecosystem: "npm"
      directory: "/apps/docs"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "05:00"
      commit-message:
          prefix: "[F][docs] "
      assignees:
          - "enesyukselx"
      labels:
          - "dependencies"
      groups:
          security-updates:
              applies-to: security-updates
              patterns:
                  - "*"
          minor-updates:
              applies-to: version-updates
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"

    # packages/ui
    - package-ecosystem: "npm"
      directory: "/packages/ui"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "05:00"
      commit-message:
          prefix: "[P][ui] "
      assignees:
          - "enesyukselx"
      labels:
          - "dependencies"
      groups:
          security-updates:
              applies-to: security-updates
              patterns:
                  - "*"
          minor-updates:
              applies-to: version-updates
              patterns:
                  - "*"
              update-types:
                  - "minor"
                  - "patch"
